<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayneTech | Beagle Systems Secure Uplink</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: #111111;
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-yellow: #fce205;
            --text-main: #e0e0e0;
            --border-color: #333;
        }

        body {
            font-family: 'Roboto', sans-serif; background-color: var(--bg-dark); color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1, h2, h3, .cyber-text { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* Login Screen */
        #login-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9); padding: 40px; border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); width: 400px; text-align: center;
        }
        .login-box h1 { color: var(--neon-blue); margin-bottom: 5px; text-shadow: 0 0 10px var(--neon-blue); }
        .input-cyber {
            width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border-color);
            color: var(--neon-blue); font-family: 'Orbitron', sans-serif; outline: none; box-sizing: border-box;
        }
        .input-cyber:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        
        .btn-cyber {
            background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue);
            padding: 12px 20px; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s; width: 100%; margin-top: 15px;
        }
        .btn-cyber:hover:not(:disabled) { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-cyber:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* Main App Layout (Drive Style) */
        #app-view { display: flex; width: 100%; height: 100%; flex-direction: column; }
        
        .top-bar {
            height: 60px; background: var(--panel-bg); border-bottom: 2px solid var(--neon-blue);
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }
        .breadcrumb { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--neon-blue); }
        .breadcrumb span { cursor: pointer; transition: text-shadow 0.2s; }
        .breadcrumb span:hover { text-shadow: 0 0 8px var(--neon-blue); }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        .sidebar {
            width: 280px; background: var(--panel-bg); border-right: 1px solid var(--border-color);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        
        .main-area { flex: 1; padding: 20px; overflow-y: auto; position: relative; }
        
        /* Drop Zone overlay for drag and drop */
        #drop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 243, 255, 0.1); border: 4px dashed var(--neon-blue);
            z-index: 50; display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron'; font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
            pointer-events: none; opacity: 0; transition: opacity 0.2s; box-sizing: border-box;
        }
        .main-area.dragover #drop-overlay { opacity: 1; }

        /* File/Folder Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .item-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px 10px; text-align: center; cursor: pointer;
            transition: all 0.2s; user-select: none;
        }
        .item-card:hover { border-color: var(--neon-blue); background: rgba(0, 243, 255, 0.1); }
        .item-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .item-name { font-size: 13px; word-break: break-all; }
        .file-size { font-size: 11px; color: #888; margin-top: 5px; }

        /* Cyberpunk Upload Progress */
        .upload-container { margin-top: 20px; display: none; background: #0a0a0a; padding: 15px; border: 1px solid var(--neon-green); }
        .progress-bar-bg { width: 100%; height: 25px; background: #000; border: 1px solid var(--neon-green); position: relative; overflow: hidden; margin-top: 10px;}
        .progress-bar-fill { height: 100%; width: 0%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); transition: width 0.1s; }
        .progress-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-family: 'Orbitron'; font-weight: bold; color: #fff; mix-blend-mode: difference; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-view">
    <div class="login-box">
        <h1>WAYNETECH</h1>
        <p class="cyber-text" style="color: #888; font-size: 12px; margin-bottom: 30px;">Beagle Systems SECURE UPLINK</p>
        <input type="text" id="username" class="input-cyber" placeholder="OPERATIVE ID (e.g., Ulf)">
        <input type="password" id="password" class="input-cyber" placeholder="AUTHORIZATION CODE">
        <button class="btn-cyber" onclick="login()">ESTABLISH CONNECTION</button>
    </div>
</div>

<div id="app-view" class="hidden">
    <div class="top-bar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div style="color: var(--neon-blue); font-family: 'Orbitron';">SYS_STATUS: <span style="color: var(--neon-green);">ONLINE</span></div>
    </div>
    
    <div class="workspace">
        <div class="sidebar">
            <h3 style="color: var(--neon-blue); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">COMMANDS</h3>
            <button class="btn-cyber" onclick="createFolder()">+ MKDIR (NEW FOLDER)</button>
            <input type="file" id="file-input" multiple class="hidden" onchange="handleFiles(this.files)">
            <button class="btn-cyber" style="border-color: var(--neon-yellow); color: var(--neon-yellow);" onclick="document.getElementById('file-input').click()">UPLOAD FILES HERE</button>
            
            <p class="cyber-text" style="font-size: 11px; color: #888; margin-top: 20px;">
                > Navigate via double-click<br>
                > Files upload to current directory<br>
                > Drag & drop supported
            </p>

            <div class="upload-container" id="upload-container">
                <div style="font-family: 'Orbitron'; color: var(--neon-green); font-size: 12px;" id="upload-status-text">TRANSMITTING...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                    <div class="progress-text" id="progress-text">0%</div>
                </div>
            </div>
        </div>
        
        <div class="main-area" id="main-area">
            <div id="drop-overlay">DROP FILES TO UPLOAD</div>
            <div class="grid" id="item-grid">
                </div>
        </div>
    </div>
</div>

<script>
    let currentPilot = "";
    let currentPath = []; 
    
    // Mock Database for the Prototype (Folders AND Files)
    // Structure: folder_name: { type: 'folder', children: {} } OR file_name: { type: 'file', size: '1.2 GB' }
    let mockFileSystem = {
        "harz": { type: 'folder', children: { 
            "01_2026": { type: 'folder', children: {} },
            "02_2026": { type: 'folder', children: {} } 
        }},
        "berlin": { type: 'folder', children: {} }
    };

    function login() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        if(!user) return;
        currentPilot = user;
        currentPath = []; // Root is the pilot's base directory
        
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        renderView();
    }

    // --- File System Navigation ---
    function getCurrentDirectory() {
        let current = mockFileSystem;
        for (let folder of currentPath) {
            current = current[folder].children;
        }
        return current;
    }

    function renderView() {
        const grid = document.getElementById('item-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        
        // Update Breadcrumb UI
        let breadcrumbHTML = `<span onclick="navigateTo(-1)">${currentPilot.toUpperCase()}</span>`;
        currentPath.forEach((folder, index) => {
            breadcrumbHTML += ` <span style="color:#555">/</span> <span onclick="navigateTo(${index})">${folder}</span>`;
        });
        breadcrumb.innerHTML = breadcrumbHTML;

        grid.innerHTML = '';
        const currentDir = getCurrentDirectory();
        
        // Render everything in the current directory
        for (let itemName in currentDir) {
            const item = currentDir[itemName];
            const div = document.createElement('div');
            div.className = 'item-card';
            
            if (item.type === 'folder') {
                div.innerHTML = `<span class="item-icon">📁</span><div class="item-name">${itemName}</div>`;
                div.ondblclick = () => {
                    currentPath.push(itemName);
                    renderView();
                };
            } else {
                // It's a file
                div.innerHTML = `<span class="item-icon" style="filter: hue-rotate(180deg);">📄</span>
                                 <div class="item-name">${itemName}</div>
                                 <div class="file-size">${item.size}</div>`;
            }

            grid.appendChild(div);
        }

        // Show empty state if nothing is there
        if (Object.keys(currentDir).length === 0) {
            grid.innerHTML = `<div style="color: #555; font-family: 'Orbitron'; grid-column: 1 / -1; text-align: center; margin-top: 50px;">
                DIRECTORY IS EMPTY. DROP FILES HERE.
            </div>`;
        }
    }

    function navigateTo(index) {
        if (index === -1) {
            currentPath = [];
        } else {
            currentPath = currentPath.slice(0, index + 1);
        }
        renderView();
    }

    function createFolder() {
        const name = prompt("Enter new directory name (e.g., flight_data_01):");
        if (name) {
            const currentDir = getCurrentDirectory();
            if(!currentDir[name]) {
                currentDir[name] = { type: 'folder', children: {} };
                renderView();
            } else {
                alert("Directory already exists!");
            }
        }
    }

    // --- Drag and Drop Logic ---
    const mainArea = document.getElementById('main-area');

    mainArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        mainArea.classList.add('dragover');
    });

    mainArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        if (e.relatedTarget === null || !mainArea.contains(e.relatedTarget)) {
            mainArea.classList.remove('dragover');
        }
    });

    mainArea.addEventListener('drop', (e) => {
        e.preventDefault();
        mainArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            handleFiles(e.dataTransfer.files);
        }
    });

    // --- File Size Formatter ---
    function formatBytes(bytes) {
        if (!+bytes) return '0 Bytes';
        const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(2))} ${sizes[i]}`;
    }

    // --- Cyberpunk Upload Simulation ---
    function handleFiles(files) {
        if(files.length === 0) return;
        
        const fileArray = Array.from(files);
        document.getElementById('upload-container').style.display = 'block';
        document.getElementById('upload-status-text').innerText = `TRANSMITTING ${fileArray.length} FILES...`;
        document.getElementById('upload-status-text').style.color = "var(--neon-green)";
        
        const fill = document.getElementById('progress-fill');
        const text = document.getElementById('progress-text');
        
        let progress = 0;
        
        // Simulate crazy fast/choppy cyberpunk upload progress
        const interval = setInterval(() => {
            progress += Math.random() * 12; 
            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                finishUpload(fileArray);
            }
            fill.style.width = `${progress}%`;
            text.innerText = `${Math.floor(progress)}%`;
        }, 100);
    }

    function finishUpload(files) {
        const fill = document.getElementById('progress-fill');
        document.getElementById('upload-status-text').innerText = "DATA SECURED.";
        document.getElementById('upload-status-text').style.color = "var(--neon-blue)";
        fill.style.boxShadow = "0 0 20px var(--neon-blue)";
        fill.style.backgroundColor = "var(--neon-blue)";
        
        // Add files to the mock file system in the CURRENT directory
        const currentDir = getCurrentDirectory();
        files.forEach(file => {
            currentDir[file.name] = { 
                type: 'file', 
                size: formatBytes(file.size) 
            };
        });

        // Re-render to show the newly uploaded files instantly
        renderView();

        // Reset progress bar UI after a delay
        setTimeout(() => {
            document.getElementById('upload-container').style.display = 'none';
            fill.style.backgroundColor = "var(--neon-green)";
            fill.style.boxShadow = "0 0 10px var(--neon-green)";
            fill.style.width = "0%";
            document.getElementById('file-input').value = ""; // Clear input
        }, 2500);
    }
</script>
</body>
</html>
