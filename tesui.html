<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beagle Systems | Pilot Data Portal</title>
    <style>
        :root {
            --primary-color: #0f172a; /* Slate 900 */
            --accent-color: #2563eb;  /* Blue 600 */
            --accent-hover: #1d4ed8;  /* Blue 700 */
            --bg-color: #f1f5f9;      /* Slate 100 */
            --card-bg: #ffffff;
            --text-main: #334155;     /* Slate 700 */
            --text-light: #64748b;    /* Slate 500 */
            --success: #10b981;       /* Emerald 500 */
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border);
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primary-color); font-size: 24px; }
        .header p { color: var(--text-light); margin-top: 5px; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 13px; color: var(--primary-color); }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; 
            box-sizing: border-box; font-size: 14px; transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        button {
            background-color: var(--accent-color); color: white; border: none; padding: 14px 20px;
            width: 100%; border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 600;
            transition: background-color 0.2s; display: flex; justify-content: center; align-items: center;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Spinner for loading states */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white;
            width: 16px; height: 16px; animation: spin 1s linear infinite; margin-left: 10px; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Upload Area */
        #drop-zone {
            border: 2px dashed var(--accent-color); border-radius: 8px; padding: 50px 20px;
            text-align: center; background-color: #eff6ff; cursor: pointer; margin-top: 10px;
            transition: all 0.2s ease;
        }
        #drop-zone:hover, #drop-zone.dragover { background-color: #dbeafe; border-color: var(--accent-hover); }
        #drop-zone svg { width: 40px; height: 40px; fill: var(--accent-color); margin-bottom: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .hidden { display: none !important; }

        /* File List UI */
        .file-list { margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .file-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px;
        }
        .file-info { display: flex; flex-direction: column; }
        .file-name { font-weight: 600; color: var(--primary-color); }
        .file-size { color: var(--text-light); font-size: 11px; }
        
        /* Logout */
        .user-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .logout-link { color: var(--text-light); text-decoration: none; font-size: 13px; cursor: pointer; }
        .logout-link:hover { color: #ef4444; }
    </style>
</head>
<body>

<div class="card" id="login-view">
    <div class="header">
        <h1>Beagle Systems</h1>
        <p>Pilot Flight Data Portal</p>
    </div>
    
    <div class="form-group">
        <label>Pilot ID / Username</label>
        <input type="text" id="username" placeholder="Enter your assigned Pilot ID">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button id="login-btn" onclick="handleLogin()">
        Secure Login <div class="spinner" id="login-spinner"></div>
    </button>
</div>

<div class="card hidden" id="upload-view">
    <div class="user-nav">
        <div>
            <strong style="color: var(--primary-color);" id="pilot-name-display">Pilot</strong>
            <span style="color: var(--success); font-size: 12px; margin-left: 5px;">● Authenticated</span>
        </div>
        <a class="logout-link" onclick="handleLogout()">Log out</a>
    </div>

    <div class="header" style="text-align: left; margin-bottom: 20px;">
        <h2 style="margin:0; font-size: 18px; color: var(--primary-color);">Upload Flight Data</h2>
        <p style="margin: 5px 0 0 0;">Select your route and upload imagery.</p>
    </div>
    
    <div class="grid-2">
        <div class="form-group">
            <label>Flight Route</label>
            <input type="text" id="route" placeholder="e.g., Harz">
        </div>
        <div class="form-group">
            <label>Flight Month</label>
            <select id="month">
                <option value="02_2026">February 2026</option>
                <option value="03_2026">March 2026</option>
                <option value="04_2026">April 2026</option>
            </select>
        </div>
    </div>

    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
        <br><strong>Drag & Drop flight logs and imagery here</strong>
        <p style="margin-top: 5px; color: var(--text-light); font-size: 13px;">or click to browse your computer (JPEG, RAW, GeoTIFF)</p>
        <input type="file" id="file-input" multiple class="hidden">
    </div>

    <div class="file-list" id="file-list"></div>
    <button id="upload-btn" class="hidden" onclick="startUpload()" style="margin-top: 20px; background-color: var(--success);">
        Transfer to AWS <div class="spinner" id="upload-spinner"></div>
    </button>
</div>

<script>
    let currentPilot = "";
    let selectedFiles = [];

    // --- Format File Size (Makes it look legit) ---
    function formatBytes(bytes, decimals = 2) {
        if (!+bytes) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    // --- 1. Secure Login Simulation ---
    function handleLogin() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const spinner = document.getElementById('login-spinner');

        if(!user || !pass) return alert("Please enter both ID and Password.");

        // Simulate backend authentication request
        btn.disabled = true;
        spinner.style.display = 'inline-block';

        setTimeout(() => {
            // MOCK: Generate a fake secure session token like a real backend would
            const fakeToken = "ey" + btoa(user + Date.now()) + ".secure_signature";
            sessionStorage.setItem('pilotAuthToken', fakeToken); // Store token securely in session
            
            currentPilot = user;
            document.getElementById('pilot-name-display').innerText = `Pilot: ${user.toUpperCase()}`;
            
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('upload-view').classList.remove('hidden');
            
            btn.disabled = false;
            spinner.style.display = 'none';
        }, 1200);
    }

    function handleLogout() {
        sessionStorage.removeItem('pilotAuthToken'); // Destroy token
        window.location.reload(); // Refresh to clear state
    }

    // --- 2. Drag & Drop Logic ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
        selectedFiles = Array.from(files);
        const fileListDiv = document.getElementById('file-list');
        
        let html = '';
        selectedFiles.slice(0, 10).forEach(f => {
            html += `<div class="file-item">
                        <div class="file-info">
                            <span class="file-name">${f.name}</span>
                            <span class="file-size">${formatBytes(f.size)}</span>
                        </div>
                     </div>`;
        });
        
        if(selectedFiles.length > 10) html += `<div class="file-item"><em>...and ${selectedFiles.length - 10} more files.</em></div>`;
        
        fileListDiv.innerHTML = html;
        if(selectedFiles.length > 0) document.getElementById('upload-btn').classList.remove('hidden');
    }

    // --- 3. Secure Upload Logic ---
    async function startUpload() {
        const route = document.getElementById('route').value.trim().toLowerCase();
        const month = document.getElementById('month').value;
        const btn = document.getElementById('upload-btn');
        const spinner = document.getElementById('upload-spinner');

        if(!route) return alert("Error: Flight Route is required to structure AWS folders.");

        const token = sessionStorage.getItem('pilotAuthToken');
        if(!token) return alert("Security Error: Your session has expired. Please log in again.");

        const basePath = `${currentPilot}/${route}/${month}/`;
        
        btn.disabled = true;
        btn.innerHTML = `Transferring to AWS... <div class="spinner" id="upload-spinner" style="display:inline-block;"></div>`;

        // Mocking the backend API call where we pass the token to prove identity
        console.log(`Sending token ${token} to backend to authorize upload to ${basePath}`);

        setTimeout(() => {
            btn.style.backgroundColor = "var(--success)";
            btn.innerHTML = `✓ Successfully Uploaded ${selectedFiles.length} files`;
            selectedFiles = [];
            
            // Reset button after 3 seconds
            setTimeout(() => {
                btn.classList.add('hidden');
                btn.disabled = false;
                btn.innerHTML = `Transfer to AWS <div class="spinner" id="upload-spinner"></div>`;
                document.getElementById('file-list').innerHTML = '';
                document.getElementById('route').value = '';
            }, 3000);

        }, 2500);
    }
</script>

</body>
</html>
