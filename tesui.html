<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beagle Systems | Tactical Flight Uplink</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f1219;
            --panel-bg: #1a1e29;
            --maverick-yellow: #f5c518;
            --hud-green: #00ff88;
            --danger-red: #ff3333;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-steel: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        h1, h2, h3, .tactical-text { font-family: 'Teko', sans-serif; text-transform: uppercase; letter-spacing: 1px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245, 197, 24, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 197, 24, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 197, 24, 0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LOGIN SCREEN --- */
        #login-view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 100;
            background: var(--bg-base); transition: opacity 0.5s ease;
        }
        .login-box {
            background: var(--panel-bg); padding: 40px; border-top: 5px solid var(--maverick-yellow);
            border-bottom: 5px solid var(--border-steel); border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 380px; text-align: center;
            animation: slideIn 0.6s ease-out;
        }
        .login-box h1 { color: #fff; font-size: 42px; margin: 0; line-height: 1; }
        
        input[type="text"], input[type="password"] {
            width: 100%; padding: 14px; margin: 12px 0; border: 2px solid var(--border-steel);
            background: rgba(0,0,0,0.3); border-radius: 4px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; box-sizing: border-box; transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--maverick-yellow); background: rgba(0,0,0,0.6); }

        .btn-tactical {
            background: var(--maverick-yellow); color: #000; border: none; padding: 14px 20px;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 800; text-transform: uppercase;
            border-radius: 4px; cursor: pointer; width: 100%; margin-top: 15px; transition: all 0.2s;
        }
        .btn-tactical:hover:not(:disabled) { background: #ffd633; transform: scale(1.02); }
        .btn-tactical:disabled { background: var(--border-steel); color: var(--text-muted); cursor: not-allowed; transform: none; }
        
        .btn-secondary { background: transparent; color: var(--text-main); border: 2px solid var(--border-steel); }
        .btn-secondary:hover:not(:disabled) { background: var(--border-steel); color: #fff; }

        /* --- MAIN UI --- */
        #app-view { display: flex; width: 100%; height: 100%; flex-direction: column; animation: slideIn 0.5s ease-out; }
        
        .top-bar {
            height: 60px; background: var(--panel-bg); border-bottom: 1px solid var(--border-steel);
            display: flex; align-items: center; padding: 0 25px; gap: 20px;
        }
        
        .btn-back {
            background: var(--border-steel); border: none; color: #fff; padding: 6px 12px;
            font-family: 'Inter', sans-serif; font-weight: 800; font-size: 12px; text-transform: uppercase;
            border-radius: 4px; cursor: pointer; transition: all 0.2s; display: none;
        }
        .btn-back:hover { background: var(--text-muted); color: #000; }

        .breadcrumb { font-family: 'Teko', sans-serif; font-size: 26px; color: var(--text-main); flex: 1; letter-spacing: 1px; }
        .breadcrumb span { cursor: pointer; transition: color 0.2s; }
        .breadcrumb span:hover { color: var(--maverick-yellow); }

        .workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar {
            width: 280px; background: var(--panel-bg); border-right: 1px solid var(--border-steel);
            padding: 25px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        
        .main-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

        /* Drag & Drop */
        #drop-overlay {
            position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            background: rgba(26, 30, 41, 0.9); border: 3px dashed var(--maverick-yellow); border-radius: 8px;
            z-index: 50; display: flex; justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .main-area.dragover #drop-overlay { opacity: 1; pointer-events: all; }
        .drop-text { font-family: 'Teko', sans-serif; font-size: 42px; color: var(--maverick-yellow); margin-top: 10px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .item-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-steel); border-radius: 6px;
            padding: 20px 15px; text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .item-card:hover { background: rgba(255,255,255,0.08); border-color: var(--text-muted); transform: translateY(-3px); }
        .item-icon { font-size: 45px; margin-bottom: 10px; display: block; }
        .item-name { font-size: 14px; font-weight: 600; word-break: break-word; color: #fff; }
        .file-size { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-weight: 600; }

        /* Custom Modal */
        #custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200; display: flex;
            justify-content: center; align-items: center; opacity: 0; pointer-events: none;
            transition: opacity 0.2s; backdrop-filter: blur(4px);
        }
        #custom-modal.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: var(--panel-bg); padding: 30px; border-radius: 4px; width: 320px;
            border-top: 4px solid var(--hud-green); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: scale(0.95); transition: transform 0.2s;
        }
        #custom-modal.active .modal-content { transform: scale(1); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }

        /* Thrust Gauge Progress Bar */
        .upload-container { margin-top: auto; display: none; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 6px; border: 1px solid var(--border-steel); }
        .progress-bar-bg { width: 100%; height: 22px; background: #000; border: 1px solid var(--border-steel); border-radius: 3px; overflow: hidden; margin-top: 8px; position: relative;}
        .progress-bar-fill { height: 100%; width: 0%; background: var(--hud-green); transition: width 0.1s linear; box-shadow: 0 0 10px var(--hud-green); }
        .progress-percent { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 12px; font-weight: 800; line-height: 22px; color: #000; mix-blend-mode: screen; }
        #upload-status { font-weight: 800; font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }

        .hidden { display: none !important; }
        
        /* Stripes for danger/warning */
        .hazard-stripes {
            height: 4px; width: 100%; margin-bottom: 20px;
            background: repeating-linear-gradient(45deg, var(--maverick-yellow), var(--maverick-yellow) 10px, #000 10px, #000 20px);
        }
    </style>
</head>
<body>

<div id="login-view">
    <div class="login-box">
        <h1 class="tactical-text">BEAGLE SYSTEMS</h1>
        <div class="hazard-stripes" style="margin-top: 10px;"></div>
        <p style="font-weight: 600; color: var(--text-muted); margin-bottom: 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Secure Flight Data Uplink</p>
        
        <input type="text" id="username" placeholder="CALLSIGN (e.g., Maverick)">
        <input type="password" id="password" placeholder="CLEARANCE CODE">
        <button class="btn-tactical" onclick="login()">Initiate Link</button>
    </div>
</div>

<div id="app-view" class="hidden">
    <div class="top-bar">
        <button class="btn-back" id="back-btn" onclick="navigateBack()">◀ ABORT/BACK</button>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div style="font-family: 'Inter'; font-weight: 800; font-size: 12px; color: var(--hud-green);">STATUS: ONLINE</div>
    </div>
    
    <div class="workspace">
        <div class="sidebar">
            <h3 class="tactical-text" style="margin-top: 0; font-size: 24px; color: var(--text-main); border-bottom: 1px solid var(--border-steel); padding-bottom: 10px;">COMMAND CENTER</h3>
            
            <button class="btn-tactical btn-secondary" onclick="openFolderModal()">+ New Sector (Folder)</button>
            <input type="file" id="file-input" multiple class="hidden" onchange="handleFiles(this.files)">
            <button class="btn-tactical" id="upload-btn" onclick="document.getElementById('file-input').click()">Transmit Logs Here</button>

            <p style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 20px; line-height: 1.6;">
                > DBL-CLICK to enter sector<br>
                > DRAG & DROP to transmit
            </p>

            <div class="upload-container" id="upload-container">
                <div id="upload-status">UPLINK IN PROGRESS...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                    <div class="progress-percent" id="progress-percent">0%</div>
                </div>
            </div>
        </div>
        
        <div class="main-area" id="main-area">
            <div id="drop-overlay">
                <span style="font-size: 50px;">🎯</span>
                <div class="drop-text">LOCK ON TARGET (DROP TO UPLOAD)</div>
            </div>
            <div class="grid" id="item-grid"></div>
        </div>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <h2 class="tactical-text" style="margin-top:0; font-size: 28px;">INITIALIZE NEW SECTOR</h2>
        <input type="text" id="new-folder-name" placeholder="Sector Name (e.g., Harz_03)">
        <div class="modal-buttons">
            <button class="btn-tactical btn-secondary" onclick="closeFolderModal()">CANCEL</button>
            <button class="btn-tactical" onclick="confirmCreateFolder()">CREATE</button>
        </div>
        <p id="modal-error" style="color: var(--danger-red); font-size: 12px; font-weight: 800; margin-top: 15px; display: none; text-transform: uppercase;">INVALID: NAME REQUIRED.</p>
    </div>
</div>

<script>
    // ==========================================
    // CONFIGURATION
    const DEMO_MODE = true; 
    // ==========================================

    let currentPilot = "";
    let currentPath = []; 
    let mockFileSystem = { "harz": { type: 'folder', children: { "01_2026": { type: 'folder', children: {} } } } };

    function login() {
        const user = document.getElementById('username').value.trim();
        if(!user) return;
        currentPilot = user.toUpperCase();
        currentPath = []; 
        document.getElementById('login-view').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            renderView();
        }, 500);
    }

    function getCurrentDirectory() {
        let current = mockFileSystem;
        for (let folder of currentPath) current = current[folder].children;
        return current;
    }

    function renderView() {
        const grid = document.getElementById('item-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const backBtn = document.getElementById('back-btn');
        
        if (currentPath.length > 0) backBtn.style.display = 'block';
        else backBtn.style.display = 'none';

        let breadcrumbHTML = `<span onclick="navigateTo(-1)">✈️ ${currentPilot}</span>`;
        currentPath.forEach((folder, index) => {
            breadcrumbHTML += ` <span style="color:var(--border-steel)">/</span> <span onclick="navigateTo(${index})">${folder}</span>`;
        });
        breadcrumb.innerHTML = breadcrumbHTML;

        grid.innerHTML = '';
        const currentDir = getCurrentDirectory();
        
        for (let itemName in currentDir) {
            const item = currentDir[itemName];
            const div = document.createElement('div');
            div.className = 'item-card';
            if (item.type === 'folder') {
                div.innerHTML = `<span class="item-icon">🗂️</span><div class="item-name">${itemName}</div>`;
                div.ondblclick = () => { currentPath.push(itemName); renderView(); };
            } else {
                div.innerHTML = `<span class="item-icon">📷</span><div class="item-name">${itemName}</div><div class="file-size">${item.size}</div>`;
            }
            grid.appendChild(div);
        }

        if (Object.keys(currentDir).length === 0) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; margin-top: 80px; color: var(--text-muted); font-weight: 600;">
                SECTOR IS EMPTY. STANDING BY FOR UPLINK.
            </div>`;
        }
    }

    function navigateTo(index) {
        if (index === -1) currentPath = [];
        else currentPath = currentPath.slice(0, index + 1);
        renderView();
    }

    function navigateBack() {
        if (currentPath.length > 0) {
            currentPath.pop(); 
            renderView();
        }
    }

    function openFolderModal() { document.getElementById('new-folder-name').value = ''; document.getElementById('modal-error').style.display = 'none'; document.getElementById('custom-modal').classList.add('active'); document.getElementById('new-folder-name').focus(); }
    function closeFolderModal() { document.getElementById('custom-modal').classList.remove('active'); }
    function confirmCreateFolder() {
        const name = document.getElementById('new-folder-name').value.trim();
        const errorMsg = document.getElementById('modal-error');
        if (!name) { errorMsg.innerText = "INVALID: SECTOR NAME REQUIRED."; errorMsg.style.display = 'block'; return; }
        const currentDir = getCurrentDirectory();
        if (currentDir[name]) { errorMsg.innerText = "INVALID: SECTOR ALREADY EXISTS."; errorMsg.style.display = 'block'; return; }
        currentDir[name] = { type: 'folder', children: {} };
        closeFolderModal(); renderView();
    }

    const mainArea = document.getElementById('main-area');
    mainArea.addEventListener('dragover', (e) => { e.preventDefault(); mainArea.classList.add('dragover'); });
    mainArea.addEventListener('dragleave', (e) => { if (e.relatedTarget === null || !mainArea.contains(e.relatedTarget)) mainArea.classList.remove('dragover'); });
    mainArea.addEventListener('drop', (e) => { e.preventDefault(); mainArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files); });

    function formatBytes(bytes) { if (!+bytes) return '0 B'; const k = 1024, sizes = ['B', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(bytes) / Math.log(k)); return `${parseFloat((bytes / Math.pow(k, i)).toFixed(1))} ${sizes[i]}`; }

    async function handleFiles(files) {
        if(files.length === 0) return;
        const file = files[0]; 
        
        const container = document.getElementById('upload-container');
        const statusText = document.getElementById('upload-status');
        const fill = document.getElementById('progress-fill');
        const percentText = document.getElementById('progress-percent');
        const uploadBtn = document.getElementById('upload-btn');
        
        container.style.display = 'block';
        uploadBtn.disabled = true;
        statusText.innerText = `TRANSMITTING ${file.name}...`;
        statusText.style.color = "var(--text-main)";
        fill.style.width = '0%';
        fill.style.backgroundColor = "var(--hud-green)";
        fill.style.boxShadow = "0 0 10px var(--hud-green)";
        percentText.innerText = '0%';

        if (DEMO_MODE) {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 8; 
                if(progress >= 100) progress = 100;
                
                fill.style.width = `${progress}%`;
                percentText.innerText = `${Math.floor(progress)}%`;

                if(progress === 100) {
                    clearInterval(interval);
                    finalizeUpload(file);
                }
            }, 150);

        } else {
            // REAL AWS XHR CODE
            try {
                const targetPath = `${currentPilot.toLowerCase()}/${currentPath.join('/')}/${file.name}`;
                // const response = await fetch(`https://api.beaglesystems.com/get-url?path=${targetPath}`);
                // const { presignedUrl } = await response.json();
                
                const presignedUrl = "MOCK_URL"; 

                await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', presignedUrl, true);
                    xhr.setRequestHeader('Content-Type', file.type);

                    xhr.upload.addEventListener('progress', (event) => {
                        if (event.lengthComputable) {
                            const percentComplete = Math.round((event.loaded / event.total) * 100);
                            fill.style.width = `${percentComplete}%`;
                            percentText.innerText = `${percentComplete}%`;
                        }
                    });

                    xhr.onload = () => { if (xhr.status === 200) resolve(); else reject(); };
                    xhr.onerror = () => reject();
                    xhr.send(file); 
                });

                finalizeUpload(file);
            } catch (error) {
                statusText.innerText = "UPLINK FAILED. CHECK CONNECTION.";
                statusText.style.color = "var(--danger-red)";
                fill.style.backgroundColor = "var(--danger-red)";
                fill.style.boxShadow = "0 0 10px var(--danger-red)";
                uploadBtn.disabled = false;
            }
        }
    }

    function finalizeUpload(file) {
        document.getElementById('upload-status').innerText = "TRANSMISSION SECURED.";
        document.getElementById('upload-status').style.color = "var(--hud-green)";
        
        const currentDir = getCurrentDirectory();
        currentDir[file.name] = { type: 'file', size: formatBytes(file.size) };
        renderView();

        setTimeout(() => {
            document.getElementById('upload-container').style.display = 'none';
            document.getElementById('file-input').value = "";
            document.getElementById('upload-btn').disabled = false;
        }, 2000);
    }
</script>
</body>
</html>
